<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - EdSkill</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-body">
  <header class="auth-topbar">
    <a href="/" class="auth-brand">
      <img
        src="https://png.pngtree.com/png-vector/20220615/ourmid/pngtree-letter-e-modern-logo-vector-png-image_5066537.png"
        alt="Logo EdSkill"
        class="auth-brand-logo"
      />
      <span>EdSkill</span>
    </a>
  </header>

  <main class="auth-shell">
    <section class="auth-split-card">
      <div class="auth-visual-panel">
        <div class="auth-visual-image auth-visual-register"></div>
      </div>

      <div class="auth-form-panel">
        <div class="auth-form-box">
          <div class="auth-badge">Bắt đầu cùng EdSkill</div>
          <h1 class="auth-title">Tạo tài khoản mới</h1>
          <p class="auth-subtitle">
            Tạo tài khoản để bắt đầu học kỹ năng theo cách hiện đại, thực tế và truyền cảm hứng.
          </p>

          <form id="registerForm" class="modern-auth-form">
            <div class="modern-form-grid">
              <div class="modern-form-group full-span">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" required />
              </div>

              <div class="modern-form-group full-span">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập email" required />
              </div>

              <div class="modern-form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required />
              </div>

              <div class="modern-form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required />
              </div>
            </div>

            <p id="formMessage" class="form-message"></p>

            <button type="submit" class="modern-auth-submit">Đăng ký</button>

            <div class="auth-bottom-links">
              <a href="/dang-nhap">Đã có tài khoản? Đăng nhập</a>
              <a href="/">Quay về trang chủ</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
