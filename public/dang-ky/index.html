<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - EdSkill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-shell container">
        <a class="brand auth-brand" href="/">
          <img src="https://png.pngtree.com/png-vector/20221126/ourmid/pngtree-modern-demo-logo-vector-png-image_6488040.png" alt="Logo EdSkill" />
          <span>EdSkill</span>
        </a>

        <section class="auth-card">
          <div class="section-pill">Bắt đầu cùng EdSkill</div>
          <h1>Tạo tài khoản mới</h1>
          <p>Tài khoản mới sẽ được lưu trực tiếp vào Render Postgres thông qua API backend. Mỗi người dùng có một mã định danh riêng.</p>

          <form id="registerForm" class="auth-form" method="post" action="/api/register">
            <div class="form-group">
              <label for="fullName">Họ và tên</label>
              <input type="text" id="fullName" name="fullName" required />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="password">Mật khẩu</label>
              <input type="password" id="password" name="password" required />
            </div>

            <div class="form-group">
             <label for="confirmPassword">Xác nhận mật khẩu</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required />
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Đăng ký</button>
            <p id="formMessage" class="form-message"></p>
          </form>

          <div class="auth-links">
            <a href="/dang-nhap">Đã có tài khoản? Đăng nhập</a>
            <a href="/">Quay về trang chủ</a>
          </div>
        </section>
      </div>
    </main>
      <script src="/script.js"></script>
  </body>
</html>
