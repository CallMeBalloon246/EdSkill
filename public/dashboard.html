<section class="dashboard-section">
  <h2>Đăng kỹ năng mới</h2>

  <form id="create-skill-form" class="skill-create-form">
    <div class="form-grid">
      <div class="form-group">
        <label for="category_id">Category ID</label>
        <input type="number" name="category_id" id="category_id" placeholder="Ví dụ: 1" required />
      </div>

      <div class="form-group">
        <label for="title">Tên kỹ năng</label>
        <input type="text" name="title" id="title" placeholder="Ví dụ: Tiếng Anh giao tiếp cho người mới" required />
      </div>
    </div>

    <div class="form-group">
      <label for="delivery_score">
        Khả năng truyền đạt:
        <span id="delivery_score_value">500</span>
      </label>
      <input
        type="range"
        id="delivery_score"
        name="delivery_score"
        min="0"
        max="1000"
        step="10"
        value="500"
      />
    </div>

    <div class="form-group">
      <label for="expertise_score">
        Kiến thức và kinh nghiệm chuyên môn:
        <span id="expertise_score_value">500</span>
      </label>
      <input
        type="range"
        id="expertise_score"
        name="expertise_score"
        min="0"
        max="1000"
        step="10"
        value="500"
      />
    </div>

    <div class="form-group">
      <label for="duration_slider">
        Thời lượng dạy:
        <span id="duration_value">1h</span>
      </label>
      <input
        type="range"
        id="duration_slider"
        name="duration_slider"
        min="0"
        max="3"
        step="1"
        value="1"
      />
      <div class="range-hints">
        <span>0.5h</span>
        <span>1h</span>
        <span>1.5h</span>
        <span>2h</span>
      </div>
    </div>

    <div class="form-group">
      <label>Hình thức học</label>
      <div class="chip-group">
        <label class="chip-option">
          <input type="checkbox" name="learning_modes" value="online" checked />
          <span>Online</span>
        </label>
        <label class="chip-option">
          <input type="checkbox" name="learning_modes" value="offline" />
          <span>Offline</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Thời gian học</label>
      <div class="chip-group days-group">
        <label class="chip-option"><input type="checkbox" name="learning_days" value="monday" checked /><span>Thứ 2</span></label>
        <label class="chip-option"><input type="checkbox" name="learning_days" value="tuesday" /><span>Thứ 3</span></label>
        <label class="chip-option"><input type="checkbox" name="learning_days" value="wednesday" /><span>Thứ 4</span></label>
        <label class="chip-option"><input type="checkbox" name="learning_days" value="thursday" /><span>Thứ 5</span></label>
        <label class="chip-option"><input type="checkbox" name="learning_days" value="friday" /><span>Thứ 6</span></label>
        <label class="chip-option"><input type="checkbox" name="learning_days" value="saturday" /><span>Thứ 7</span></label>
      </div>
    </div>

    <div class="form-group">
      <label for="detailed_description">Miêu tả chi tiết kỹ năng</label>
      <textarea
        name="detailed_description"
        id="detailed_description"
        placeholder="Mô tả chi tiết nội dung kỹ năng, cách dạy, đối tượng phù hợp..."
        required
      ></textarea>
    </div>

    <button type="submit">Đăng kỹ năng</button>
  </form>

  <p id="create-skill-message"></p>
</section>
