<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - EdSkill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <h1>Dashboard thành viên</h1>
        <button id="logout-btn">Đăng xuất</button>
      </div>

      <section class="dashboard-section">
        <h2>Thông tin tài khoản</h2>
        <div id="me-box"></div>
      </section>

      <section class="dashboard-section">
        <h2>Đăng kỹ năng mới</h2>
        <form id="create-skill-form" class="auth-form">
          <input type="number" name="category_id" placeholder="Category ID (ví dụ 1)" required />
          <input type="text" name="title" placeholder="Tiêu đề kỹ năng" required />
          <textarea name="description" placeholder="Mô tả kỹ năng" required></textarea>
          <select name="level">
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
          </select>
          <select name="learning_mode">
            <option value="online">Online</option>
            <option value="offline">Offline</option>
            <option value="both">Both</option>
          </select>
          <input type="number" name="price_per_session" placeholder="Giá / buổi" value="0" />
          <label class="checkbox-row">
            <input type="checkbox" name="exchange_only" checked />
            Chỉ trao đổi kỹ năng
          </label>
          <button type="submit">Đăng kỹ năng</button>
        </form>
        <p id="create-skill-message"></p>
      </section>

      <section class="dashboard-section">
        <h2>Kỹ năng của tôi</h2>
        <div id="my-skills-box" class="skills-grid"></div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
