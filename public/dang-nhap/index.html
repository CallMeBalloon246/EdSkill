<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - EdSkill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-shell container">
        <a class="brand auth-brand" href="/">
          <img src="https://png.pngtree.com/png-vector/20221126/ourmid/pngtree-modern-demo-logo-vector-png-image_6488040.png" alt="Logo EdSkill" />
          <span>EdSkill</span>
        </a>

        <section class="auth-card">
          <div class="section-pill">Chào mừng quay lại</div>
          <h1>Đăng nhập tài khoản</h1>
          <p>Trang đăng nhập này gọi API backend để kiểm tra email và mật khẩu đã lưu trong Render Postgres.</p>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="password">Mật khẩu</label>
              <input type="password" id="password" name="password" required />
            </div>

            <button type="submit" class="btn btn-primary auth-submit">Đăng nhập</button>
            <p id="formMessage" class="form-message"></p>
          </form>

          <div class="auth-links">
            <a href="/dang-ky">Chưa có tài khoản? Đăng ký</a>
            <a href="/">Quay về trang chủ</a>
          </div>
        </section>
      </div>
    </main>
      <script>
  const loginForm = document.getElementById('loginForm');
  const formMessage = document.getElementById('formMessage');

  loginForm.addEventListener('submit', async function (e) {
    e.preventDefault();

    formMessage.textContent = '';
    formMessage.className = 'form-message';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      const data = await response.json();

      if (!response.ok) {
        formMessage.textContent = data.message || 'Không thể đăng nhập.';
        formMessage.classList.add('error');
        return;
      }

      localStorage.setItem('edskillUser', JSON.stringify(data.user));

      formMessage.textContent = 'Đăng nhập thành công. Đang chuyển hướng...';
      formMessage.classList.add('success');

      setTimeout(function () {
        window.location.href = '/';
      }, 800);
    } catch (error) {
      formMessage.textContent = 'Đã có lỗi xảy ra khi đăng nhập.';
      formMessage.classList.add('error');
      console.error('Lỗi đăng nhập:', error);
    }
  });
  </script>
  <script src="/script.js"></script>
  </body>
</html>
