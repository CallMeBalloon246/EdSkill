<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - EdSkill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-shell container">
        <a class="brand auth-brand" href="/">
          <img src="https://png.pngtree.com/png-vector/20221126/ourmid/pngtree-modern-demo-logo-vector-png-image_6488040.png" alt="Logo EdSkill" />
          <span>EdSkill</span>
        </a>

        <section class="auth-card">
          <div class="section-pill">Chào mừng quay lại</div>
          <h1>Đăng nhập tài khoản</h1>
          <p>Trang đăng nhập này gọi API backend để kiểm tra email và mật khẩu đã lưu trong Render Postgres.</p>

          <form class="auth-form" id="loginForm">
            <label>
              <span>Email</span>
              <input type="email" name="email" placeholder="ban@edskill.vn" required />
            </label>
            <label>
              <span>Mật khẩu</span>
              <input type="password" name="password" placeholder="••••••••" required />
            </label>
            <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
            <p class="form-message" id="loginMessage"></p>
          </form>

          <div class="auth-links">
            <a href="/dang-ky">Chưa có tài khoản? Đăng ký</a>
            <a href="/">Quay về trang chủ</a>
          </div>
        </section>
      </div>
    </main>
      <script src="/script.js" defer></script>
  </body>
</html>
