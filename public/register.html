<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - EdSkill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Đăng ký thành viên</h1>
      <form id="register-form" class="auth-form">
        <input type="text" name="full_name" placeholder="Họ và tên" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Mật khẩu (ít nhất 8 ký tự)" required />
        <input type="text" name="city" placeholder="Thành phố" />
        <textarea name="bio" placeholder="Giới thiệu ngắn"></textarea>
        <button type="submit">Tạo tài khoản</button>
      </form>
      <p id="register-message"></p>
      <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
