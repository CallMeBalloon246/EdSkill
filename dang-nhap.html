<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - EdSkill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-shell container">
        <a class="brand auth-brand" href="index.html">
          <img src="https://png.pngtree.com/png-vector/20221126/ourmid/pngtree-modern-demo-logo-vector-png-image_6488040.png" alt="Logo EdSkill" />
          <span>EdSkill</span>
        </a>

        <section class="auth-card">
          <div class="section-pill">Chào mừng quay lại</div>
          <h1>Đăng nhập tài khoản</h1>
          <p>Đây là giao diện tĩnh để bạn deploy frontend trước trên Render. Sau này có thể nối API thật.</p>

          <form class="auth-form">
            <label>
              <span>Email</span>
              <input type="email" placeholder="ban@edskill.vn" />
            </label>
            <label>
              <span>Mật khẩu</span>
              <input type="password" placeholder="••••••••" />
            </label>
            <button type="button" class="btn btn-primary btn-block">Đăng nhập</button>
          </form>

          <div class="auth-links">
            <a href="dang-ky.html">Chưa có tài khoản? Đăng ký</a>
            <a href="index.html">Quay về trang chủ</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
