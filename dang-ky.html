<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - EdSkill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-shell container">
        <a class="brand auth-brand" href="index.html">
          <img src="https://png.pngtree.com/png-vector/20221126/ourmid/pngtree-modern-demo-logo-vector-png-image_6488040.png" alt="Logo EdSkill" />
          <span>EdSkill</span>
        </a>

        <section class="auth-card">
          <div class="section-pill">Bắt đầu cùng EdSkill</div>
          <h1>Tạo tài khoản mới</h1>
          <p>Form này là frontend tĩnh để bạn deploy ngay trên Render trước khi ghép backend hoặc Firebase.</p>

          <form class="auth-form auth-form-grid">
            <label>
              <span>Họ và tên</span>
              <input type="text" placeholder="Nguyễn Văn A" />
            </label>
            <label>
              <span>Email</span>
              <input type="email" placeholder="ban@edskill.vn" />
            </label>
            <label>
              <span>Mật khẩu</span>
              <input type="password" placeholder="Tối thiểu 8 ký tự" />
            </label>
            <label>
              <span>Xác nhận mật khẩu</span>
              <input type="password" placeholder="Nhập lại mật khẩu" />
            </label>
            <button type="button" class="btn btn-primary btn-block">Đăng ký</button>
          </form>

          <div class="auth-links">
            <a href="dang-nhap.html">Đã có tài khoản? Đăng nhập</a>
            <a href="index.html">Quay về trang chủ</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
